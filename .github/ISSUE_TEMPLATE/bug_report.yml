name: Bug Report
description: Report a bug or unexpected behavior in EnterpriseRAG-AI
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior.
      placeholder: |
        1. Start the service with `docker-compose up`
        2. Send a POST request to `/api/v1/query` with payload `{...}`
        3. Observe the error in response / logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The API should return a 200 response with the RAG-generated answer.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or unexpected output.
      placeholder: Got a 500 Internal Server Error with traceback...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      options:
        - FastAPI API Layer
        - Redis Cache / Queue
        - FAISS Vector Retrieval
        - LLM Inference Layer
        - PostgreSQL / SQLAlchemy
        - Celery Workers
        - OpenTelemetry / Jaeger Tracing
        - Prometheus / Grafana Monitoring
        - Docker / docker-compose
        - Kubernetes / k8s
        - Frontend (React/TypeScript)
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.2

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04 / macOS Ventura / Windows 11

  - type: input
    id: docker-version
    attributes:
      label: Docker / Docker Compose Version
      placeholder: e.g., Docker 24.0.5, Compose v2.20.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Tracebacks
      description: Paste any relevant logs, error messages, or stack traces here.
      render: shell
      placeholder: |
        Traceback (most recent call last):
          ...
        ERROR: ...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help.

  - type: checkboxes
    id: gssoc
    attributes:
      label: GSSoC 2026
      options:
        - label: I am a registered GSSoC 2026 contributor
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have included all reproduction steps and relevant environment details
          required: true
