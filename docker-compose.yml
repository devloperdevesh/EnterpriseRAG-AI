  #     - "3000:3000"

  postgres:
    image: postgres:16
    container_name: postgres_enterprise_rag
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enterprise_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_enterprise_rag
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    name: enterprise_rag_postgres_data

  redis_data:
    name: enterprise_rag_redis_data